[charts]
# package can be: state, cgd, region, updates, chart, all, catalog
package = state
value = AK
output = ~/charts/noaa-enc
extract = yes
keep_zip = yes
force = yes
max_age_days = 30

[gps]
# Use gpsd for onboard production so OpenCPN and this tool can share the GPS.
mode = gpsd
device = /dev/ttyUSB0
baud = 4800
gpsd_host = 127.0.0.1
gpsd_port = 2947

[tracking]
output = ~/charts/noaa-enc
# Keep this many days of rotated GPX track logs; 0 disables pruning.
retention_days = 90
