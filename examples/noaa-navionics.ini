[charts]
# package can be: state, cgd, region, chart, all
package = state
value = AK
# Use an absolute path or a path starting with ~ for unattended systemd services.
output = ~/charts/noaa-enc
extract = yes
keep_zip = yes
force = yes
max_age_days = 30
min_free_gb = 2.0

[gps]
# Use gpsd for onboard production so OpenCPN and this tool can share the GPS.
mode = gpsd
# Use /dev/serial/by-id/... or /dev/serial/by-path/... for USB GPS, or a documented stable alias.
device = /dev/serial/by-id/YOUR_GPS_DEVICE
baud = 4800
gpsd_host = 127.0.0.1
gpsd_port = 2947

[tracking]
# Use an absolute path or a path starting with ~ for unattended systemd services.
output = ~/charts/noaa-enc
# Keep this many days of rotated GPX track logs; 0 disables pruning.
retention_days = 90

[anchor]
# Default alarm radius used by anchor-watch and the status GUI Anchor Check.
radius_meters = 50
